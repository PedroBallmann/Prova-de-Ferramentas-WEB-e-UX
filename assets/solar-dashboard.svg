    <path d="M102 438 480 268 815 438 427 623Z" fill="#cfe1ee"/>
    <path d="M125 421 477 262 790 420 429 590Z" fill="url(#panel)"/>
    <g stroke="#d9f4ff" stroke-width="7" opacity=".95">
      <path d="M196 390 500 541"/>
      <path d="M271 356 575 506"/>
      <path d="M346 322 651 471"/>
      <path d="M421 288 727 437"/>
      <path d="M183 448 533 289"/>
