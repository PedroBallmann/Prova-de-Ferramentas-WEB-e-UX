<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">Painel solar inteligente com monitoramento por aplicativo</title>
  <desc id="desc">Ilustracao de paineis solares, sol e painel de controle de energia em um smartphone.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecf9ff"/>
      <stop offset=".56" stop-color="#f7fbf4"/>
      <stop offset="1" stop-color="#fff6d8"/>
    </linearGradient>
    <linearGradient id="sun" x1=".2" y1=".2" x2=".9" y2=".9">
      <stop offset="0" stop-color="#ffe680"/>
      <stop offset=".5" stop-color="#ffb02e"/>
      <stop offset="1" stop-color="#f58220"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d3d66"/>
      <stop offset="1" stop-color="#0f6ca6"/>
    </linearGradient>
    <linearGradient id="phone" x1=".1" y1="0" x2=".9" y2="1">
      <stop offset="0" stop-color="#10263d"/>
      <stop offset="1" stop-color="#0b5f7d"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#0f2740" flood-opacity=".18"/>
    </filter>
  </defs>

  <rect width="960" height="720" rx="48" fill="url(#sky)"/>
  <circle cx="170" cy="155" r="78" fill="url(#sun)"/>
  <g stroke="#ffb02e" stroke-width="10" stroke-linecap="round" opacity=".75">
