    <rect x="612" y="166" width="170" height="302" rx="22" fill="#f8feff"/>
    <rect x="650" y="145" width="92" height="9" rx="5" fill="#d9f4ff" opacity=".7"/>
    <path d="M644 324c42 25 73 16 98-33" fill="none" stroke="#0e9f6e" stroke-width="13" stroke-linecap="round"/>
